<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provision Test Accounts — CrowdShield</title>
    <style>
        :root {
            --bg: #08131f;
            --card: #111b27;
            --accent: #1d4ed8;
            --success: #059669;
            --error: #dc2626;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 { font-size: 1.8rem; margin-bottom: 8px; text-align: center; }
        p { color: var(--text-dim); text-align: center; margin-bottom: 30px; font-size: 0.95rem; }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover { background: #2563eb; transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #results {
            margin-top: 30px;
            display: none;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 15px;
            font-family: monospace;
            font-size: 0.85rem;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid var(--border);
        }

        .result-item {
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }
        .result-item:last-child { border-bottom: none; }
        .status-success { color: var(--success); }
        .status-error { color: var(--error); }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading .spinner { display: block; }
        .loading span { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Account Provisioning</h1>
        <p>This tool will create 5 test accounts with the password <strong>admin123</strong> and assign their respective roles: admin, fire, medical, police, and attendee.</p>
        
        <button id="provision-btn" class="btn">
            <div class="spinner"></div>
            <span>Provision All Accounts</span>
        </button>

        <div id="results"></div>
    </div>

    <script>
        const btn = document.getElementById('provision-btn');
        const resultsDiv = document.getElementById('results');

        btn.addEventListener('click', async () => {
            btn.disabled = true;
            btn.classList.add('loading');
            resultsDiv.style.display = 'none';
            resultsDiv.innerHTML = '';

            try {
                const response = await fetch('/api/admin/provision', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: 'admin123' })
                });

                const data = await response.json();
                
                resultsDiv.style.display = 'block';
                
                if (data.results) {
                    data.results.forEach(res => {
                        const div = document.createElement('div');
                        div.className = 'result-item';
                        div.innerHTML = `
                            <span>${res.email}</span>
                            <span class="${res.status === 'success' ? 'status-success' : 'status-error'}">
                                ${res.status === 'success' ? '✓ ' + res.role : '✗ ' + res.error}
                            </span>
                        `;
                        resultsDiv.appendChild(div);
                    });
                } else {
                    resultsDiv.innerHTML = `<div class="status-error">Error: ${data.error || 'Unknown error'}</div>`;
                }
            } catch (err) {
                resultsDiv.style.display = 'block';
                resultsDiv.innerHTML = `<div class="status-error">Request failed. Is the server running?</div>`;
            } finally {
                btn.disabled = false;
                btn.classList.remove('loading');
            }
        });
    </script>
</body>
</html>
